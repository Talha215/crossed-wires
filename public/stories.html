<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Archive — Crossed Wires</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .cards { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
    .story-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 18px;
      cursor: pointer;
      transition: filter 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .story-card:hover { filter: brightness(1.2); }
    .story-card .card-body { flex: 1; min-width: 0; }
    .story-card h3 { margin: 0 0 4px; font-size: 1.05rem; }
    .del-btn { flex: none; padding: 8px 10px; font-size: 1rem; }
    .story-card .meta { color: var(--muted); font-size: 0.85rem; }
    .back-link { display: block; text-align: center; color: var(--muted); margin-top: 6px; }
    .back-link a, .tagline a { color: var(--accent); }
    #s-meta { text-align: center; }
    #s-hint-box { margin-top: 14px; }
    #s-doodle-wrap p { text-align: center; margin-bottom: 8px; }
    .empty { text-align: center; color: var(--muted); margin-top: 40px; }
  </style>
</head>
<body>
  <main id="app">
    <section id="list-view">
      <h1 class="logo">📚 Story Archive</h1>
      <p class="tagline"><a href="/">← Back to the game</a></p>
      <div id="cards" class="cards"></div>
      <p id="empty" class="empty" hidden>No finished stories yet — go write some nonsense!</p>
    </section>

    <section id="story-view" hidden>
      <button id="btn-back" class="ghost">← All stories</button>
      <h2 id="s-title" class="reveal-title"></h2>
      <p id="s-meta" class="muted small"></p>
      <p class="muted small" style="text-align:center">Hover or tap a passage to see its author and secret hint.</p>
      <div id="s-prose" class="story-prose"></div>
      <div id="s-hint-box" class="prompt-box" hidden></div>
      <div id="s-doodle-wrap" hidden>
        <p class="muted small">…and the doodle from that game:</p>
        <canvas id="reveal-canvas"></canvas>
      </div>
    </section>
  </main>

  <script>
    const $ = id => document.getElementById(id);

    function strokePath(ctx, s, W, H) {
      const w = Math.max(1.5, s.width * W);
      ctx.strokeStyle = ctx.fillStyle = s.color;
      ctx.lineWidth = w;
      ctx.lineCap = ctx.lineJoin = 'round';
      const pts = s.points;
      if (pts.length === 1) {
        ctx.beginPath();
        ctx.arc(pts[0][0] * W, pts[0][1] * H, w / 2, 0, Math.PI * 2);
        ctx.fill();
        return;
      }
      ctx.beginPath();
      ctx.moveTo(pts[0][0] * W, pts[0][1] * H);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0] * W, pts[i][1] * H);
      ctx.stroke();
    }

    async function showList() {
      $('story-view').hidden = true;
      $('list-view').hidden = false;
      const stories = await (await fetch('/api/stories')).json();
      const cards = $('cards');
      cards.innerHTML = '';
      $('empty').hidden = stories.length > 0;
      // The server enforces this too — the button is just hidden elsewhere.
      const isHostMachine = ['localhost', '127.0.0.1'].includes(location.hostname);
      for (const s of stories) {
        const card = document.createElement('div');
        card.className = 'story-card';
        const body = document.createElement('div');
        body.className = 'card-body';
        const h = document.createElement('h3');
        h.textContent = s.title;
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `${new Date(s.finishedAt).toLocaleDateString()} · ` +
          `${s.turns} turn${s.turns === 1 ? '' : 's'} · ${s.players.join(', ')}`;
        body.append(h, meta);
        card.append(body);
        if (isHostMachine) {
          const del = document.createElement('button');
          del.className = 'ghost del-btn';
          del.textContent = '🗑️';
          del.title = 'Delete this story forever';
          del.addEventListener('click', async e => {
            e.stopPropagation();
            if (!confirm(`Delete "${s.title}" forever?`)) return;
            const r = await fetch('/api/stories/' + s.id, { method: 'DELETE' });
            if (r.ok) showList();
            else alert((await r.json()).error);
          });
          card.append(del);
        }
        card.addEventListener('click', () => showStory(s.id));
        cards.append(card);
      }
    }

    async function showStory(id) {
      const story = await (await fetch('/api/stories/' + id)).json();
      $('list-view').hidden = true;
      $('story-view').hidden = false;
      $('s-title').textContent = story.title;
      $('s-meta').textContent = `${new Date(story.finishedAt).toLocaleString()} · ` +
        story.players.join(', ');
      $('s-hint-box').hidden = true;

      const prose = $('s-prose');
      prose.innerHTML = '';
      story.contributions.forEach((c, i) => {
        const seg = document.createElement('span');
        seg.className = 'seg';
        if (story.voteWinners && story.voteWinners.includes(i)) {
          seg.className += ' winner';
          seg.textContent = '👑 ' + c.text;
        } else {
          seg.textContent = c.text;
        }
        const reveal = () => {
          for (const el of document.querySelectorAll('.seg.lit')) el.classList.remove('lit');
          seg.classList.add('lit');
          const box = $('s-hint-box');
          box.hidden = false;
          box.textContent = `Turn ${i + 1} — written by ${c.name}\n\n🤫 ${c.hint}`;
        };
        seg.addEventListener('mouseenter', reveal);
        seg.addEventListener('click', reveal);
        prose.append(seg);
        if (i < story.contributions.length - 1) prose.append(' ');
      });

      const wrap = $('s-doodle-wrap');
      wrap.hidden = !(story.strokes && story.strokes.length);
      if (!wrap.hidden) {
        requestAnimationFrame(() => {
          const rc = $('reveal-canvas');
          const dpr = window.devicePixelRatio || 1;
          rc.width = Math.round(rc.clientWidth * dpr);
          rc.height = Math.round(rc.clientHeight * dpr);
          const ctx = rc.getContext('2d');
          for (const s of story.strokes) strokePath(ctx, s, rc.width, rc.height);
        });
      }
      window.scrollTo(0, 0);
    }

    $('btn-back').addEventListener('click', showList);
    showList();
  </script>
</body>
</html>
